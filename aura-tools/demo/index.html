<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aura Tools — Demo en vivo · Yusta Labs</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;overflow:hidden;background:#080810;font-family:'Inter',sans-serif}
    .topbar{
      position:fixed;top:0;left:0;right:0;z-index:100;
      height:44px;background:#0d0d1a;border-bottom:1px solid rgba(255,255,255,.08);
      display:flex;align-items:center;justify-content:space-between;padding:0 20px;gap:16px;
    }
    .topbar-left{display:flex;align-items:center;gap:12px}
    .topbar-logo{font-weight:800;font-size:13px;letter-spacing:.5px;color:#fff;text-decoration:none}
    .topbar-logo span{color:#F0B429}
    .topbar-sep{width:1px;height:16px;background:rgba(255,255,255,.12)}
    .topbar-name{font-size:12px;color:rgba(255,255,255,.5);letter-spacing:.3px}
    .topbar-badge{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
      background:rgba(240,180,41,.12);border:1px solid rgba(240,180,41,.25);color:#F0B429;
      padding:2px 8px;border-radius:4px}
    .topbar-right{display:flex;align-items:center;gap:10px}
    .topbar-btn{font-size:12px;font-weight:600;padding:5px 14px;border-radius:6px;text-decoration:none;
      border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.7);
      transition:.15s;cursor:pointer;background:none}
    .topbar-btn:hover{border-color:rgba(255,255,255,.3);color:#fff}
    .topbar-btn.primary{background:#F0B429;border-color:#F0B429;color:#080810}
    .topbar-btn.primary:hover{background:#d99614;border-color:#d99614}
    .info-banner{position:fixed;top:44px;left:0;right:0;z-index:99;height:38px;background:linear-gradient(90deg,rgba(240,180,41,0.08),rgba(240,180,41,0.04));border-bottom:1px solid rgba(240,180,41,0.2);display:flex;align-items:center;justify-content:center;gap:8px;padding:0 20px;font-size:12px;color:rgba(255,255,255,0.85);font-weight:500;letter-spacing:.1px}
    .info-banner b{color:#F0B429;font-weight:700}
    .info-banner-icon{font-size:14px}
    @media (max-width:640px){.info-banner{font-size:10.5px;padding:0 12px}}
    iframe{position:fixed;top:82px;left:0;right:0;bottom:0;width:100%;height:calc(100% - 82px);border:none}
  </style>
<meta property="og:type" content="website">
  <meta property="og:url" content="https://yustalabs.com/aura-tools/demo">

  <meta name="twitter:card" content="summary_large_image">

<body>
  <div class="topbar">
    <div class="topbar-left">
      <a href="/" class="topbar-logo">Yusta<span>Labs</span></a>

      <span class="topbar-name">Aura Tools</span>
      <span class="topbar-badge">Demo</span>
    </div>
    <div class="topbar-right">
      <a href="/aura-tools" class="topbar-btn">← Volver</a>
      <a href="https://wa.me/541124693394?text=Hola!%20Quiero%20más%20info%20sobre%20Aura Tools." target="_blank" class="topbar-btn primary">Quiero mi sistema →</a>
    </div>
  </div>
  <div class="info-banner">
