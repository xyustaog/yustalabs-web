<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500&amp;display=swap');
      .wordmark {
        font-family: 'Space Grotesk', 'Inter', 'Helvetica Neue', Arial, sans-serif;
        font-weight: 500;
        font-size: 34px;
        letter-spacing: 4.5px;
        fill: #F2F2F2;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" fill="#0A0A0D"/>

  <!-- Y monogram — centered, scaled 1.9× -->
  <g transform="translate(155, 100) scale(1.9)">
    <!-- Left arm outer (white) -->
    <polygon points="10,4 26,4 50,60 44,60" fill="#F2F2F2"/>
    <!-- Left arm inner (gold accent) -->
    <polygon points="30,4 36,4 53,60 49,60" fill="#C9A96E"/>
    <!-- Right arm inner (white) -->
    <polygon points="64,4 70,4 51,60 47,60" fill="#F2F2F2"/>
    <!-- Right arm outer (white) -->
    <polygon points="74,4 90,4 56,60 50,60" fill="#F2F2F2"/>
    <!-- Stem with diagonal cut at bottom-right -->
    <path d="M 43 60 L 57 60 L 57 98 L 51 108 L 43 108 Z" fill="#F2F2F2"/>
    <!-- Gold dot -->
    <circle cx="60" cy="107" r="1.7" fill="#C9A96E"/>
  </g>

  <!-- Wordmark -->
  <text x="250" y="390" text-anchor="middle" class="wordmark">YUSTA LABS</text>
</svg>
